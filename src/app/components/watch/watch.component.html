<div class="watch-container" [class.portrait]="isPortrait" [class.overlay-hidden]="overlayHidden">
  <!-- <video #player id="watch-player" controls autoplay playsinline loop (loadedmetadata)="onVideoLoaded(player)">
  </video> -->
  <!-- VOD player -->
  <video #player id="watch-player" [class.is-hidden]="currentItem?.type === 'live'"
    (loadedmetadata)="onVideoLoaded(player)" (ended)="next()" playsinline controls>
  </video>

  <div #agoraContainer class="agora-container" [class.is-hidden]="currentItem?.type !== 'live'">
  </div>

  <!-- Overlay (fills the container) -->
  <div class="overlay" [class.hidden]="overlayHidden">
    <!-- Top-left title + LIVE chip -->
    <div class="topbar">
      <mat-chip-set>
        <mat-chip *ngIf="currentItem?.type === 'live'" color="warn" selected>LIVE</mat-chip>
        <mat-chip *ngIf="currentItem?.type === 'vod' && $any(currentItem).isProcessed" class="processed-chip" selected>
          <mat-icon matChipAvatar>auto_awesome</mat-icon>
          Processed
        </mat-chip>
      </mat-chip-set>
      <!-- <div class="title">{{ currentItem?.title }}</div> -->
    </div>

    <!-- Side nav buttons -->
    <button gamepadFocusable class="nav prev" mat-icon-button (click)="previous()" [disabled]="!hasMany" aria-label="Previous">
      <mat-icon>skip_previous</mat-icon>
    </button>

    <button #nextBtn gamepadFocusable class="nav next" mat-icon-button (click)="next()" [disabled]="!hasMany" aria-label="Next">
      <mat-icon>skip_next</mat-icon>
    </button>

    <button gamepadFocusable class="profile" mat-icon-button (click)="goToProfile()" aria-label="Profile">
      <mat-icon>arrow_downward</mat-icon>
    </button>

  </div>
</div>
