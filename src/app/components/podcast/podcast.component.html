<div class="podcast-view">

  <!-- ── Local camera preview (always visible) ── -->
  <video #localPreview class="local-preview" autoplay playsinline muted></video>

  <!-- ── Remote stage (active call) ── -->
  <section class="stage" *ngIf="isConnected">
    <div id="stage">
      <div id="remote-container" class="stage__grid">
        <!-- remote tiles injected by RtcService -->
      </div>
    </div>
  </section>

  <!-- ── User-picker panel (slides up above toolbar) ── -->
  <div class="user-picker" *ngIf="showUserPicker">
    <div class="user-picker__header">
      <span class="user-picker__title">People</span>
      <button class="user-picker__close" (click)="showUserPicker = false">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <input class="user-picker__search" type="search" placeholder="Search users…" />

    <div class="user-picker__list">
      <label class="user"
             *ngFor="let u of (users$ | async)"
             [class.self]="u.auth0UserId == (user$ | async)?.sub">
        <input type="checkbox"
               [(ngModel)]="selected[u.agoraUserId]"
               [disabled]="u.auth0UserId == (user$ | async)?.sub || (!canSelect(u.agoraUserId) && !selected[u.agoraUserId])" />
        <span class="user__avatar">{{ u.username?.[0] || 'U' }}</span>
        <span class="user__name">{{ u.username }}</span>
        <span class="user__presence" [class.online]="online(u.agoraUserId)"></span>
      </label>
    </div>

    <div class="user-picker__footer">
      <mat-slide-toggle [(ngModel)]="isVideo" [disabled]="isPodcast">Video</mat-slide-toggle>
      <button mat-flat-button color="primary"
              [disabled]="selectedCount === 0"
              (click)="callSelected(); showUserPicker = false">
        Call {{ selectedCount > 0 ? '(' + selectedCount + ')' : '' }}
      </button>
    </div>
  </div>

  <!-- ── Bottom toolbar ── -->
  <div class="toolbar">

    <span class="toolbar__status" [class.toolbar__status--live]="isRecording || isLive">
      <i class="toolbar__dot"></i>
      LIVE
    </span>

    <div class="toolbar__sep"></div>

    <button class="toolbar__btn toolbar__btn--people" [class.toolbar__btn--active]="showUserPicker"
            (click)="toggleUserPicker()" title="People">
      <mat-icon>person_add</mat-icon>
    </button>

    <div class="toolbar__sep"></div>

    <button class="toolbar__btn toolbar__btn--rec"
            [class.toolbar__btn--rec-on]="isRecording"
            (click)="isRecording ? stopRecording() : startRecording()"
            title="Record">
      <i class="toolbar__dot toolbar__dot--red"></i>
      REC
    </button>

    <div class="toolbar__sep"></div>

    <button class="toolbar__btn toolbar__btn--live"
            [class.toolbar__btn--live-on]="isLive"
            [disabled]="!isRecording"
            (click)="toggleLive()"
            title="Go live">
      <mat-icon class="toolbar__live-icon">fiber_manual_record</mat-icon>
      GO LIVE
    </button>

    <div class="toolbar__sep"></div>

    <button class="toolbar__btn toolbar__btn--ai" title="AI Magic" [disabled]="true">
      ✦ AI Magic
    </button>

  </div>

</div>
